services:
  - type: web
    name: alterego-backend
    env: python
    plan: free
    rootDir: voice-system/backend

    buildCommand: pip install -r requirements.txt

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

      - key: OPENAI_API_KEY
        sync: false

      - key: MODEL_NAME
        value: gpt-4.1-mini
