version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always

  backend:
    build:
      context: ./voice-system/backend
      dockerfile: ../../docker/backend.Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=sqlite:///./data/alterego.db
    volumes:
      - ./voice-system/backend/data:/app/data
      - ./voice-system/backend/logs:/app/logs
    depends_on:
      - redis
    restart: always

  worker:
    build:
      context: ./voice-system/backend
      dockerfile: ../../docker/worker.Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=sqlite:///./data/alterego.db
    volumes:
      - ./voice-system/backend/data:/app/data
      - ./voice-system/backend/logs:/app/logs
    depends_on:
      - redis
    restart: always

  frontend:
    build:
      context: .
      dockerfile: ./docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_VOICE_WS_URL=ws://localhost:8000/ws/voice
    depends_on:
      - backend
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always
